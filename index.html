<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <div class="app-header">
      <h1>To-Do List</h1>
      <div class="app-header-right">
        <div id="task-counter">0 active · 0 done</div>
        <button type="button" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      </div>
    </div>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="What do you need to do?" autocomplete="off">
      <input type="date" id="task-due-input" aria-label="Due date (optional)">
      <button type="submit">Add</button>
    </form>

    <div class="filter-tabs" id="filter-tabs">
      <button type="button" class="filter-btn active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="active">Active</button>
      <button type="button" class="filter-btn" data-filter="done">Done</button>
    </div>

    <div class="sort-headers" id="sort-headers">
      <button type="button" class="sort-header" data-field="dateEntered">Date Entered<span class="sort-arrow"></span></button>
      <button type="button" class="sort-header" data-field="text">Task<span class="sort-arrow"></span></button>
      <button type="button" class="sort-header" data-field="dueDate">Due Date<span class="sort-arrow"></span></button>
    </div>

    <ul id="task-list"></ul>

    <p id="empty-message">Nothing here yet — add your first task above.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
