<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>To-Do List</h1>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="What do you need to do?" autocomplete="off">
      <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <p id="empty-message">Nothing here yet — add your first task above.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
